name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Start SUT (app-card-delivery.jar)
      run: java -jar ./artifacts/app-card-delivery.jar &

    - name: Run Tests in headless mode
      run: ./gradlew test -Dselenide.headless=true
